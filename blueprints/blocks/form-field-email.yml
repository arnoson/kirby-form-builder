name: arnoson.kirby-form-builder.email
icon: 📧
fields:
  extends: fields/form-field-basic
  validators:
    type: hidden
    default: '["email"]'
  default:
    extends: fields/form-field-default
    type: email
    width: 1/2
  placeholder:
    extends: fields/form-field-placeholder
    width: 1/2
  error:
    extends: fields/form-error-message
    placeholder: arnoson.kirby-form-builder.invalid-email-error
