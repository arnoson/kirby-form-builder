name: arnoson.kirby-form-builder.radio
icon: 🔘
fields:
  extends: fields/form-field-basic
  default:
    extends: fields/form-field-default
    type: text
    placeholder: arnoson-kirby-form-builder.default-radio-placeholder
  options:
    type: structure
    label: arnoson.kirby-form-builder.options
    fields:
      value:
        type: text
        label: arnoson.kirby-form-builder.value
        width: 1/2
        required: true
        pattern: '^[^,]*$'
        help: arnoson.kirby-form-builder.no-comma-in-value
      text:
        type: text
        label: arnoson.kirby-form-builder.text
        width: 1/2
  error:
    extends: fields/form-error-message
    placeholder: arnoson.kirby-form-builder.invalid-radio-error
